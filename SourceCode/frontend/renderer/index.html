<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能任务监控</title>
  <meta name="description" content="智能任务监控 — 实时监控进程状态、资源占用与日志进度">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Custom Title Bar -->
  <div class="titlebar" id="titlebar">
    <div class="titlebar-drag">
      <svg class="titlebar-icon" viewBox="0 0 24 24" fill="none"
           xmlns="http://www.w3.org/2000/svg"
           style="flex-shrink:0"
           aria-hidden="true"
           role="img"
      >
        <title>智能任务监控</title>
        <path d="M12 2C7.58 2 4 5.58 4 10c0 3.5 2.2 6.48 5.5 7.67V20c0 .55.45 1 1 1h3c.55 0 1-.45 1-1v-2.33C17.8 16.48 20 13.5 20 10c0-4.42-3.58-8-8-8z" fill="currentColor" opacity="0.2"/>
        <path d="M12 5c-2.76 0-5 2.24-5 5 0 2.5 1.84 4.58 4.25 4.94V18h1.5v-3.06C14.16 14.58 16 12.5 16 10c0-2.76-2.24-5-5-5z" fill="currentColor" opacity="0.55"/>
        <circle cx="12" cy="10" r="2" fill="currentColor"/>
      </svg>
      <span class="titlebar-text">智能任务监控</span>
    </div>
    <div class="titlebar-controls">
      <button class="titlebar-btn" id="tb-minimize" title="最小化">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="0" y="5.5" width="12" height="1.5" rx="0.5" fill="currentColor"/></svg>
      </button>
      <button class="titlebar-btn" id="tb-maximize" title="最大化">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="0.5" y="0.5" width="11" height="11" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
      <button class="titlebar-btn titlebar-close" id="tb-close" title="关闭">
        <svg width="12" height="12" viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="10" y1="2" x2="2" y2="10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <main class="app-main">
    <!-- Left Panel: Process List -->
    <aside class="left-panel" id="left-panel">
      <div class="panel-header">
        <h2>系统进程</h2>
        <span class="panel-subtitle" id="process-count">0 个进程</span>
      </div>
      <div class="search-box">
        <span class="search-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/>
            <path d="M21 21l-4.35-4.35"/>
          </svg>
        </span>
        <input type="text" id="process-search" placeholder="搜索名称或 PID..." autocomplete="off">
        <button id="btn-refresh-processes" class="btn-icon" title="刷新进程列表">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </div>
      <div class="process-list" id="process-list">
        <!-- Process items injected here -->
      </div>
      <div class="panel-footer">
        <button id="btn-watch-selected" class="btn btn-primary btn-block" disabled>设置监控</button>
      </div>
    </aside>

    <!-- Right Panel: Status Bar + Task Grid + Detail -->
    <section class="right-panel" id="right-panel">
      <!-- Status Bar (monitoring page only) -->
      <div class="status-bar" id="status-bar">
        <div class="status-left">
          <span class="status-item" id="refresh-status-item" style="opacity: 0; transition: opacity 0.3s;">
            <span class="status-label spinning" id="refresh-spinner">⟳</span>
            <span id="refresh-status-text" class="status-value" style="color: var(--color-info);">正在刷新…</span>
          </span>
        </div>
        <div class="status-right">
          <span class="status-item">
            <span class="status-label">最后更新</span>
            <span id="last-update-time" class="status-value">--:--:--</span>
          </span>
          <span class="status-item">
            <span class="status-label">刷新周期</span>
            <input type="range" id="refresh-interval" min="30" max="180" step="30" value="60">
            <span id="refresh-interval-display" class="status-value">60s</span>
          </span>
        </div>
      </div>

      <!-- Task grid -->
      <div id="task-grid" class="task-grid"></div>

      <!-- Empty state -->
      <div id="empty-state" class="empty-state">
        <div class="empty-icon">
          <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
        </div>
        <p>暂无监控任务</p>
        <p class="empty-hint">从左侧选择进程并点击「设置监控」</p>
      </div>

      <!-- Detail Panel (collapsible) -->
      <div id="detail-panel" class="detail-panel hidden">
        <div class="detail-header">
          <h3 id="detail-title">任务详情</h3>
          <div class="detail-header-actions">
            <button id="btn-refresh-detail" class="btn-icon" title="刷新任务状态">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
              </svg>
            </button>
            <button id="btn-close-detail" class="btn-icon" title="关闭">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="detail-body">
          <div class="detail-info" id="detail-info"></div>
          <div class="detail-ask" id="detail-ask">
            <div class="ask-history" id="ask-history">
            <div class="ask-empty-hint" id="ask-empty-hint">
              <div class="ask-empty-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
              </div>
              <div class="ask-empty-title">与 AI 助手对话</div>
              <div class="ask-empty-desc">输入问题，获取任务状态分析、异常排查建议</div>
            </div>
          </div>
            <div class="ask-input-bar">
              <input type="text" id="ask-input" placeholder="询问该任务状态，例如：当前进度如何？" autocomplete="off">
              <button id="btn-send-ask" class="btn btn-send">发送</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Watch Dialog (modal) -->
  <div id="watch-dialog" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <header class="modal-header">
        <h2>设置监控</h2>
        <button class="btn-close" id="btn-close-watch-dialog">&times;</button>
      </header>
      <form id="watch-form" class="modal-body">
        <div class="form-group">
          <label>进程信息</label>
          <div class="process-info-display" id="watch-process-info"></div>
        </div>
        <div class="form-group">
          <label for="watch-alias">监视名称 <span class="required">*</span></label>
          <input type="text" id="watch-alias" name="alias" required>
        </div>
        <div class="form-group">
          <label>日志路径</label>
          <div class="file-picker-row">
            <span id="watch-log-display" class="file-picker-display">未选择</span>
            <input type="hidden" id="watch-log" name="log">
            <button type="button" class="btn btn-sm btn-secondary" id="btn-browse-file">选择文件</button>
            <button type="button" class="btn btn-sm btn-secondary" id="btn-browse-dir">选择目录</button>
          </div>
          <span class="form-hint">可选，支持同时选择多个文件</span>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="btn-cancel-watch">取消</button>
          <button type="submit" class="btn btn-primary">开始监控</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Notification Toast -->
  <div id="toast" class="toast hidden">
    <span id="toast-message"></span>
  </div>

  <!-- Scripts -->
  <script src="services/websocket.js"></script>
  <script src="components/ProcessList.js"></script>
  <script src="components/TaskCard.js"></script>
  <script src="components/TaskGrid.js"></script>
  <script src="components/TaskDetailPanel.js"></script>
  <script src="app.js"></script>
</body>
</html>
